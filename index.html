<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCB Router — USB Audio Board (Strict DRC)</title>
<style>
:root{--bg:#07111F;--bg2:#0D1E30;--bg3:#112540;--border:#1E3A5A;--text:#B8D4F0;--text2:#4A7899}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SFMono-Regular',Consolas,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.title{font-size:13px;font-weight:700;color:#3A8FD8}.sub{font-size:9px;color:var(--text2);margin-top:1px}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;gap:5px;align-items:center;flex-shrink:0}
.tab{background:#112540;border:1.5px solid var(--border);border-radius:4px;padding:3px 12px;cursor:pointer;font-size:11px;font-weight:700;color:#7AA8CC;font-family:inherit}
.tab[data-l=TOP].active{background:#8B4020;border-color:#FF8C69;color:#FFB899}
.tab[data-l=ART02].active{background:#1A3A60;border-color:#69C4FF;color:#B0E4FF}
.tab[data-l=ART03].active{background:#1A3A20;border-color:#A8FF69;color:#C8FFA0}
.tab[data-l=BOTTOM].active{background:#3A2E10;border-color:#FFD069;color:#FFE8A0}
.ctrl-row{background:var(--bg2);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;gap:10px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.sep{width:1px;background:var(--border);height:14px}
.ck-item{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px}
.ck-item input{accent-color:#3A8FD8;width:12px;height:12px;cursor:pointer}
.ck-dot{width:8px;height:8px;border-radius:2px}
#net-sel{background:#0A1825;border:1.5px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:10px;padding:2px 6px;max-width:200px;outline:none}
.zoom-btns{display:flex;gap:4px;margin-left:auto;align-items:center}
.zbtn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;padding:2px 9px;cursor:pointer;font-family:inherit}
.zbtn:hover{border-color:#3A8FD8}
.zoom-val{font-size:9px;color:var(--text2);padding:0 5px;min-width:42px;text-align:center}
.infobar{background:var(--bg2);border-bottom:1px solid var(--border);padding:3px 16px;display:flex;gap:14px;font-size:9px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
.infobar span{color:var(--text);font-weight:700}
.warn{color:#FFB830!important}
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
svg#board{width:100%;height:100%;display:block}
#tooltip{position:absolute;background:#0D1E30EE;border:1px solid #2A5070;border-radius:4px;padding:5px 8px;font-size:9px;pointer-events:none;display:none;z-index:100;max-width:280px;line-height:1.8}
.hint{position:absolute;bottom:7px;right:10px;font-size:8px;color:var(--text2);opacity:.4;pointer-events:none}
</style>
</head>
<body>
<header>
  <span style="font-size:18px">⚡</span>
  <div>
    <div class="title">PCB Router — USB Audio Board · Strict DRC (No Crossings)</div>
    <div class="sub">4-layer A* + RRR · 12/26 nets fully routed · 14 nets need finer grid (J3502 dense area)</div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" data-l="TOP"    onclick="selLayer('TOP')">TOP</button>
  <button class="tab"        data-l="ART02"  onclick="selLayer('ART02')">ART02</button>
  <button class="tab"        data-l="ART03"  onclick="selLayer('ART03')">ART03</button>
  <button class="tab"        data-l="BOTTOM" onclick="selLayer('BOTTOM')">BOTTOM</button>
</div>
<div class="ctrl-row">
  <span class="ctrl-label">显示</span>
  <label class="ck-item"><input type="checkbox" id="ck-outline" checked onchange="setVis('g-outline',this.checked)">
    <span class="ck-dot" style="background:#2A80C0;border:1px solid #4AB0E0"></span>板框</label>
  <label class="ck-item"><input type="checkbox" id="ck-feasible" checked onchange="setVis('g-feasible',this.checked)">
    <span class="ck-dot" style="background:#00CC77;opacity:.4;border:1px solid #00EE88"></span>可行域</label>
  <label class="ck-item"><input type="checkbox" id="ck-comps" checked onchange="setVis('g-comps',this.checked)">
    <span class="ck-dot" style="background:#3A6080;border:1px solid #5A90B0"></span>组件</label>
  <label class="ck-item"><input type="checkbox" id="ck-wires" checked onchange="setVis('g-wires',this.checked)">
    <span class="ck-dot" style="background:#FFD070"></span>走线(12)</label>
  <label class="ck-item"><input type="checkbox" id="ck-rats" checked onchange="setVis('g-rats',this.checked)">
    <span class="ck-dot" style="background:transparent;border:1px dashed #FF6666"></span>飞线(14)</label>
  <label class="ck-item"><input type="checkbox" id="ck-vias" checked onchange="setVis('g-vias',this.checked)">
    <span class="ck-dot" style="background:#FFDD44"></span>Via</label>
  <div class="sep"></div>
  <span class="ctrl-label">Net</span>
  <select id="net-sel" onchange="filterNet(this.value)"><option value="">— 全部 —</option></select>
  <div class="zoom-btns">
    <button class="zbtn" onclick="resetView()">⊡ Fit</button>
    <button class="zbtn" onclick="zoomStep(1.35)">＋</button>
    <span class="zoom-val" id="zoom-val">100%</span>
    <button class="zbtn" onclick="zoomStep(1/1.35)">－</button>
  </div>
</div>
<div class="infobar">
  <div>走线: <span>12/26</span> ✓DRC</div>
  <div>飞线(未通): <span class="warn">14</span></div>
  <div>总线长: <span id="i-len">—</span>mm</div>
  <div>Via: <span>24</span></div>
  <div>Layer: <span id="i-layer">TOP</span></div>
  <div>Net: <span id="i-net" style="color:#00DD88">—</span></div>
</div>
<div id="canvas-wrap">
  <svg id="board" xmlns="http://www.w3.org/2000/svg">
    <g id="root-g">
      <g id="g-feasible"></g>
      <g id="g-comps"></g>
      <g id="g-outline"></g>
      <g id="g-rats"></g>
      <g id="g-wires"></g>
      <g id="g-vias"></g>
    </g>
  </svg>
  <div id="tooltip"></div>
  <div class="hint">Scroll=zoom · Drag=pan · Tab切换层</div>
</div>

<script>
const PCB=JSON.parse(document.getElementById('pcb-data').textContent);
const NS='http://www.w3.org/2000/svg';
const LCOLORS={TOP:'#FF8C69',ART02:'#69C4FF',ART03:'#A8FF69',BOTTOM:'#FFD069'};
let currentLayer='TOP',currentNet='';
function mk(tag,a){const e=document.createElementNS(NS,tag);for(const[k,v]of Object.entries(a))e.setAttribute(k,v);return e;}
const G=id=>document.getElementById(id);
const GRP={outline:G('g-outline'),feasible:G('g-feasible'),comps:G('g-comps'),
           wires:G('g-wires'),rats:G('g-rats'),vias:G('g-vias')};

G('g-outline').appendChild(mk('path',{d:PCB.board_path,fill:'none',stroke:'#3A90D0','stroke-width':'0.12','stroke-linejoin':'round'}));
PCB.feasible_paths.forEach(d=>GRP.feasible.appendChild(mk('path',{d,fill:'#00CC7715',stroke:'#00CC77','stroke-width':'0.04'})));
PCB.comps.forEach(c=>{
  const[b0,b1,b2,b3]=c.bbox;
  const r=mk('rect',{x:b0,y:-b3,width:b2-b0,height:b3-b1,fill:'rgba(25,55,85,0.4)',stroke:'#2A6080','stroke-width':'0.03',cursor:'pointer'});
  r.addEventListener('mouseenter',e=>showTip(e,`<b style="color:#5AC0F0">${c.refdes}</b> ${c.package}`));
  r.addEventListener('mouseleave',hideTip);r.addEventListener('mousemove',moveTip);
  GRP.comps.appendChild(r);
  if(b2-b0>0.4&&b3-b1>0.2){const t=mk('text',{x:c.cx,y:-c.cy,fill:'#4080A0','font-size':Math.min((b2-b0)*.35,(b3-b1)*.55,0.22).toFixed(3),'text-anchor':'middle','dominant-baseline':'middle','pointer-events':'none'});t.textContent=c.refdes;GRP.comps.appendChild(t);}
});

// Net 下拉
const ns=G('net-sel');
PCB.nets.forEach(n=>{const o=document.createElement('option');o.value=n;o.textContent=n;const rd=PCB.routes[n];if(rd)o.style.color=rd.color;ns.appendChild(o);});

function renderWires(){
  GRP.wires.innerHTML='';GRP.rats.innerHTML='';GRP.vias.innerHTML='';
  let totalLen=0;
  Object.entries(PCB.routes).forEach(([net,rd])=>{
    const dim=currentNet&&currentNet!==net;
    const col=rd.color;
    totalLen+=rd.len||0;
    if(rd.ok){
      // 当前层走线
      const segs=(rd.layers[currentLayer])||[];
      segs.forEach(seg=>{
        if(seg.length<2)return;
        const pts=seg.map(s=>s.split(',').map(Number));
        let d='M'+pts[0][0]+','+pts[0][1];pts.slice(1).forEach(p=>d+='L'+p[0]+','+p[1]);
        const p=mk('path',{d,fill:'none',stroke:col,'stroke-width':'0.09','stroke-linecap':'round','stroke-linejoin':'round',opacity:dim?0.1:1,cursor:'pointer'});
        p.addEventListener('mouseenter',e=>showTip(e,`<b style="color:${col}">${net}</b><br>✓ DRC通过 · ${rd.len}mm`));
        p.addEventListener('mouseleave',hideTip);p.addEventListener('mousemove',moveTip);
        GRP.wires.appendChild(p);
      });
      // Via
      if(!dim) rd.vias.forEach(([vx,vy])=>{
        GRP.vias.appendChild(mk('circle',{cx:vx,cy:vy,r:'0.13',fill:'#FFDD44',stroke:'#AA8800','stroke-width':'0.03'}));
      });
    } else {
      // 飞线（未路由）
      rd.ratsnest.forEach(([a,b])=>{
        const p=mk('line',{x1:a[0],y1:a[1],x2:b[0],y2:b[1],stroke:'#FF6666','stroke-width':'0.05','stroke-dasharray':'0.3,0.2',opacity:dim?0.1:0.7,cursor:'pointer'});
        p.addEventListener('mouseenter',e=>showTip(e,`<b style="color:#FF8888">${net}</b><br>⚠ 未路由（密集区限制）`));
        p.addEventListener('mouseleave',hideTip);p.addEventListener('mousemove',moveTip);
        GRP.rats.appendChild(p);
        // 端点标记
        if(!dim){
          [[a[0],a[1]],[b[0],b[1]]].forEach(([px,py])=>{
            GRP.rats.appendChild(mk('circle',{cx:px,cy:py,r:'0.08',fill:'#FF6666',opacity:'0.8'}));
          });
        }
      });
    }
  });
  G('i-len').textContent=totalLen.toFixed(1);
}

function selLayer(l){currentLayer=l;document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.l===l));G('i-layer').textContent=l;renderWires();}
function filterNet(n){currentNet=n;G('i-net').textContent=n||'—';renderWires();}
const TIP=G('tooltip');
function showTip(e,h){TIP.innerHTML=h;TIP.style.display='block';moveTip(e);}
function hideTip(){TIP.style.display='none';}
function moveTip(e){const w=G('canvas-wrap').getBoundingClientRect();let lx=e.clientX-w.left+12,ly=e.clientY-w.top+8;if(lx+290>w.width)lx-=300;TIP.style.left=lx+'px';TIP.style.top=ly+'px';}

const CANVAS=G('canvas-wrap'),ROOT=G('root-g');
let tr={x:0,y:0,k:1},fitK=20,fitX=0,fitY=0,svgW=800,svgH=600;
function applyT(){ROOT.setAttribute('transform',`translate(${tr.x.toFixed(2)},${tr.y.toFixed(2)}) scale(${tr.k.toFixed(4)})`);G('zoom-val').textContent=Math.round(tr.k/fitK*100)+'%';}
function calcFit(){const r=CANVAS.getBoundingClientRect();svgW=r.width||800;svgH=r.height||600;const b=PCB.bbox,w=b.xmax-b.xmin,h=b.ymax-b.ymin;fitK=Math.min(svgW*.9/w,svgH*.88/h);fitX=svgW/2-(b.xmin+b.xmax)/2*fitK;fitY=svgH/2+(b.ymin+b.ymax)/2*fitK;}
function resetView(){calcFit();tr={x:fitX,y:fitY,k:fitK};applyT();}
function zoomStep(f){zoomAt(svgW/2,svgH/2,f);}
function zoomAt(cx,cy,f){const nk=Math.max(fitK*.05,Math.min(fitK*400,tr.k*f));const r2=nk/tr.k;tr.x=cx-(cx-tr.x)*r2;tr.y=cy-(cy-tr.y)*r2;tr.k=nk;applyT();}
CANVAS.addEventListener('wheel',e=>{e.preventDefault();const r=CANVAS.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);},{passive:false});
let drag=null;
CANVAS.addEventListener('mousedown',e=>{if(e.button!==0)return;drag={sx:e.clientX,sy:e.clientY,tx:tr.x,ty:tr.y};CANVAS.classList.add('dragging');});
window.addEventListener('mousemove',e=>{if(!drag)return;tr.x=drag.tx+(e.clientX-drag.sx);tr.y=drag.ty+(e.clientY-drag.sy);applyT();});
window.addEventListener('mouseup',()=>{drag=null;CANVAS.classList.remove('dragging');});
function setVis(id,v){G(id).style.display=v?'':'none';}
window.addEventListener('DOMContentLoaded',()=>{renderWires();resetView();});
window.addEventListener('resize',resetView);
</script>
</body>
