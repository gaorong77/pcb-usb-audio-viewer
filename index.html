<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCB Router Viewer — USB Audio Board</title>
<style>
:root{--bg:#07111F;--bg2:#0D1E30;--bg3:#112540;--border:#1E3A5A;--text:#B8D4F0;--text2:#4A7899}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SFMono-Regular',Consolas,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:7px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.title{font-size:13px;font-weight:700;color:#3A8FD8}.sub{font-size:9px;color:var(--text2);margin-top:1px}
.tabs{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 16px;display:flex;gap:5px;align-items:center;flex-shrink:0}
.tab{background:#112540;border:1.5px solid var(--border);border-radius:5px;padding:3px 13px;cursor:pointer;font-size:11px;font-weight:700;color:#7AA8CC;transition:all .12s;font-family:inherit}
.tab:hover{border-color:#3A8FD8}
.tab[data-l=TOP].active{background:#8B4020;border-color:#FF8C69;color:#FFB899}
.tab[data-l=ART02].active{background:#1A3A60;border-color:#69C4FF;color:#B0E4FF}
.tab[data-l=ART03].active{background:#1A3A20;border-color:#A8FF69;color:#C8FFA0}
.tab[data-l=BOTTOM].active{background:#3A2E10;border-color:#FFD069;color:#FFE8A0}
.ctrl-row{background:var(--bg2);border-bottom:1px solid var(--border);padding:4px 16px;display:flex;gap:10px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.sep{width:1px;background:var(--border);height:14px;flex-shrink:0}
.ck-item{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px;color:var(--text)}
.ck-item input{accent-color:#3A8FD8;width:12px;height:12px;cursor:pointer}
.ck-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.net-wrap{display:flex;align-items:center;gap:6px}
#net-sel{background:#0A1825;border:1.5px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:10px;padding:2px 6px;cursor:pointer;max-width:210px;outline:none}
#net-sel option{background:#0D1E30}
.zoom-btns{display:flex;gap:4px;margin-left:auto;align-items:center;flex-shrink:0}
.zbtn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;padding:2px 9px;cursor:pointer;font-family:inherit;transition:all .12s}
.zbtn:hover{border-color:#3A8FD8;color:#B0E4FF}
.zoom-val{font-size:9px;color:var(--text2);padding:0 5px;min-width:42px;text-align:center}
.infobar{background:var(--bg2);border-bottom:1px solid var(--border);padding:3px 16px;display:flex;gap:14px;font-size:9px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
.infobar span{color:var(--text);font-weight:700}
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
svg#board{width:100%;height:100%;display:block}
#tooltip{position:absolute;background:#0D1E30EE;border:1px solid #2A5070;border-radius:4px;padding:5px 8px;font-size:9px;pointer-events:none;display:none;z-index:100;max-width:260px;line-height:1.8}
.hint{position:absolute;bottom:7px;right:10px;font-size:8px;color:var(--text2);opacity:.4;pointer-events:none}
</style>
</head>
<body>
<header>
  <span style="font-size:18px">⚡</span>
  <div>
    <div class="title">PCB Router Viewer — USB Audio Board</div>
    <div class="sub">18.1×35.4mm · 4-layer A* · 26/26 nets routed · 206mm wire · 24 vias · clearance=0.075mm</div>
  </div>
</header>
<div class="tabs">
  <button class="tab active" data-l="TOP"    onclick="selLayer('TOP')">TOP</button>
  <button class="tab"        data-l="ART02"  onclick="selLayer('ART02')">ART02</button>
  <button class="tab"        data-l="ART03"  onclick="selLayer('ART03')">ART03</button>
  <button class="tab"        data-l="BOTTOM" onclick="selLayer('BOTTOM')">BOTTOM</button>
</div>
<div class="ctrl-row">
  <span class="ctrl-label">显示</span>
  <label class="ck-item"><input type="checkbox" id="ck-outline" checked onchange="setVis('g-outline',this.checked)">
    <span class="ck-dot" style="background:#2A80C0;border:1px solid #4AB0E0"></span>板框</label>
  <label class="ck-item"><input type="checkbox" id="ck-feasible" checked onchange="setVis('g-feasible',this.checked)">
    <span class="ck-dot" style="background:#00CC77;opacity:.5;border:1px solid #00EE88"></span>可行域</label>
  <label class="ck-item"><input type="checkbox" id="ck-clearance" onchange="setVis('g-clearance',this.checked)">
    <span class="ck-dot" style="background:#FF8C42;opacity:.5;border:1px solid #FF8C42"></span>Clearance</label>
  <label class="ck-item"><input type="checkbox" id="ck-comps" checked onchange="setVis('g-comps',this.checked)">
    <span class="ck-dot" style="background:#3A6080;border:1px solid #6AA0C0"></span>组件</label>
  <label class="ck-item"><input type="checkbox" id="ck-wires" checked onchange="setVis('g-wires',this.checked)">
    <span class="ck-dot" style="background:#FFD070;border:1px solid #FFD070"></span>走线</label>
  <label class="ck-item"><input type="checkbox" id="ck-vias" checked onchange="setVis('g-vias',this.checked)">
    <span class="ck-dot" style="background:#FF6B6B;border:1px solid #FF6B6B"></span>Via</label>
  <label class="ck-item"><input type="checkbox" id="ck-pins" onchange="setVis('g-pins',this.checked)">
    <span class="ck-dot" style="background:#B8D4F0;border:1px solid #B8D4F0"></span>引脚</label>
  <div class="sep"></div>
  <div class="net-wrap"><span class="ctrl-label">Net</span>
    <select id="net-sel" onchange="filterNet(this.value)"><option value="">— 全部 —</option></select></div>
  <div class="zoom-btns">
    <button class="zbtn" onclick="resetView()">⊡ Fit</button>
    <button class="zbtn" onclick="zoomStep(1.35)">＋</button>
    <span class="zoom-val" id="zoom-val">100%</span>
    <button class="zbtn" onclick="zoomStep(1/1.35)">－</button>
  </div>
</div>
<div class="infobar">
  <div>Board: <span>18.1×35.4mm</span></div>
  <div>走线: <span>26/26 nets</span></div>
  <div>总长: <span>206.0mm</span></div>
  <div>Via: <span>24</span></div>
  <div>Layer: <span id="i-layer">TOP</span></div>
  <div>Net: <span id="i-net" style="color:#00DD88">—</span></div>
</div>
<div id="canvas-wrap">
  <svg id="board" xmlns="http://www.w3.org/2000/svg">
    <g id="root-g">
      <g id="g-feasible"></g>
      <g id="g-clearance"></g>
      <g id="g-comps"></g>
      <g id="g-outline"></g>
      <g id="g-pins"></g>
      <g id="g-wires"></g>
      <g id="g-vias"></g>
    </g>
  </svg>
  <div id="tooltip"></div>
  <div class="hint">Scroll=zoom · Drag=pan · Tab切换层 · 点击走线查看网络</div>
</div>

// ── 可行域 ──
PCB.feasible_paths.forEach(d=>GRP.feasible.appendChild(mkEl('path',{d,fill:'#00CC7718',stroke:'#00CC77','stroke-width':'0.04'})));

// ── Clearance ──
PCB.clearance_paths.forEach(d=>GRP.clearance.appendChild(mkEl('path',{d,fill:'#FF8C4210',stroke:'#FF8C42','stroke-width':'0.03',opacity:'0.8'})));

// ── 组件 ──
PCB.comps.forEach(c=>{
  const[b0,b1,b2,b3]=c.bbox;
  const rx=b0,ry=-b3,rw=b2-b0,rh=b3-b1;
  const rect=mkEl('rect',{x:rx,y:ry,width:rw,height:rh,fill:'rgba(30,60,90,0.4)',stroke:'#3A7090','stroke-width':'0.03',cursor:'pointer'});
  rect.addEventListener('mouseenter',e=>showTip(e,`<b style="color:#6AC0F0">${c.refdes}</b> ${c.package}<br>引脚:${c.pins.length}`));
  rect.addEventListener('mouseleave',hideTip);
  rect.addEventListener('mousemove',moveTip);
  GRP.comps.appendChild(rect);
  if(rw>0.4&&rh>0.2){
    const t=mkEl('text',{x:c.cx,y:-c.cy,fill:'#5090B0','font-size':Math.min(rw*.35,rh*.55,0.22).toFixed(3),'text-anchor':'middle','dominant-baseline':'middle','pointer-events':'none'});
    t.textContent=c.refdes; GRP.comps.appendChild(t);
  }
});

// ── Net 下拉 ──
const ns=GS2('net-sel');
PCB.nets.forEach(n=>{
  const o=document.createElement('option');o.value=n;o.textContent=n;
  const rd=PCB.routes[n];if(rd)o.style.color=rd.color;
  ns.appendChild(o);
});

// ── 走线渲染 ──
function renderWires(){
  GRP.wires.innerHTML='';GRP.vias.innerHTML='';GRP.pins.innerHTML='';
  const showNet=currentNet;
  Object.entries(PCB.routes).forEach(([net,rd])=>{
    const dim=showNet&&showNet!==net;
    const col=rd.color;
    const lsegs=rd.layers[currentLayer]||[];
    lsegs.forEach(seg=>{
      if(seg.length<2)return;
      const pts=seg.map(s=>s.split(',').map(Number));
      let d='M'+pts[0][0]+','+pts[0][1];
      pts.slice(1).forEach(p=>d+='L'+p[0]+','+p[1]);
      const path=mkEl('path',{d,fill:'none',stroke:col,'stroke-width':LAYER_WIRE_W[currentLayer]||'0.09',
        'stroke-linecap':'round','stroke-linejoin':'round',
        opacity:dim?0.12:1,cursor:'pointer'});
      path.addEventListener('mouseenter',e=>showTip(e,`<b style="color:${col}">${net}</b><br>长度: ${rd.len}mm  Via: ${rd.vias.length}`));
      path.addEventListener('mouseleave',hideTip);
      path.addEventListener('mousemove',moveTip);
      GRP.wires.appendChild(path);
    });
    // Via
    if(!dim) rd.vias.forEach(([vx,vy])=>{
      const c=mkEl('circle',{cx:vx,cy:vy,r:'0.12',fill:'#FFDD44',stroke:'#AA8800','stroke-width':'0.03',opacity:'0.9'});
      GRP.vias.appendChild(c);
    });
  });
  // 引脚
  PCB.comps.forEach(comp=>{
    comp.pins.forEach(p=>{
      const rd=PCB.routes[p.net];
      const col=rd?rd.color:'#445566';
      const dim=showNet&&p.net!==showNet;
      const c=mkEl('circle',{cx:p.x,cy:-p.y,r:'0.08',fill:col,stroke:'#0A1520','stroke-width':'0.015',opacity:dim?0.08:0.9,cursor:'pointer'});
      c.addEventListener('mouseenter',e=>showTip(e,`<b style="color:${col}">${comp.refdes} P${p.num}</b><br>Net: ${p.net||'—'}`));
      c.addEventListener('mouseleave',hideTip);
      c.addEventListener('mousemove',moveTip);
      GRP.pins.appendChild(c);
    });
  });
}

function selLayer(l){
  currentLayer=l;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.l===l));
  GS2('i-layer').textContent=l;
  renderWires();
}
function filterNet(n){currentNet=n;GS2('i-net').textContent=n||'—';renderWires();}

// ── Tooltip ──
const TIP=GS2('tooltip');
function showTip(e,html){TIP.innerHTML=html;TIP.style.display='block';moveTip(e);}
function hideTip(){TIP.style.display='none';}
function moveTip(e){
  const w=GS2('canvas-wrap').getBoundingClientRect();
  let lx=e.clientX-w.left+12,ly=e.clientY-w.top+8;
  if(lx+270>w.width)lx=e.clientX-w.left-275;
  TIP.style.left=lx+'px';TIP.style.top=ly+'px';
}

// ── Pan/Zoom ──
const CANVAS=GS2('canvas-wrap'),ROOT=GS2('root-g');
let tr={x:0,y:0,k:1},fitK=20,fitX=0,fitY=0,svgW=800,svgH=600;
function applyT(){ROOT.setAttribute('transform',`translate(${tr.x.toFixed(2)},${tr.y.toFixed(2)}) scale(${tr.k.toFixed(4)})`);GS2('zoom-val').textContent=Math.round(tr.k/fitK*100)+'%';}
function calcFit(){
  const r=CANVAS.getBoundingClientRect();svgW=r.width||800;svgH=r.height||600;
  const b=PCB.bbox,w=b.xmax-b.xmin,h=b.ymax-b.ymin;
  fitK=Math.min(svgW*.9/w,svgH*.88/h);
  fitX=svgW/2-(b.xmin+b.xmax)/2*fitK;
  fitY=svgH/2+(b.ymin+b.ymax)/2*fitK;
}
function resetView(){calcFit();tr={x:fitX,y:fitY,k:fitK};applyT();}
function zoomStep(f){zoomAt(svgW/2,svgH/2,f);}
function zoomAt(cx,cy,f){
  const nk=Math.max(fitK*.05,Math.min(fitK*400,tr.k*f));
  const r=nk/tr.k;tr.x=cx-(cx-tr.x)*r;tr.y=cy-(cy-tr.y)*r;tr.k=nk;applyT();
}
CANVAS.addEventListener('wheel',e=>{e.preventDefault();const r=CANVAS.getBoundingClientRect();zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);},{passive:false});
let drag=null;
CANVAS.addEventListener('mousedown',e=>{if(e.button!==0)return;drag={sx:e.clientX,sy:e.clientY,tx:tr.x,ty:tr.y};CANVAS.classList.add('dragging');});
window.addEventListener('mousemove',e=>{if(!drag)return;tr.x=drag.tx+(e.clientX-drag.sx);tr.y=drag.ty+(e.clientY-drag.sy);applyT();});
window.addEventListener('mouseup',()=>{drag=null;CANVAS.classList.remove('dragging');});
function setVis(id,v){GS2(id).style.display=v?'':'none';}
window.addEventListener('DOMContentLoaded',()=>{renderWires();resetView();});
window.addEventListener('resize',resetView);
</script>
</body>
