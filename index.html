<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCB Component Viewer — USB Audio Board</title>
<style>
:root{--bg:#07111F;--bg2:#0D1E30;--bg3:#112540;--border:#1E3A5A;--text:#B8D4F0;--text2:#4A7899}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SFMono-Regular',Consolas,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.title{font-size:13px;font-weight:700;color:#3A8FD8}.sub{font-size:9px;color:var(--text2);margin-top:1px}
.ctrl-row{background:var(--bg2);border-bottom:1px solid var(--border);padding:5px 16px;display:flex;gap:11px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.ctrl-label{font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.sep{width:1px;background:var(--border);height:14px;flex-shrink:0}
.ck-item{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px;color:var(--text)}
.ck-item input{accent-color:#3A8FD8;width:12px;height:12px;cursor:pointer}
.ck-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.net-wrap{display:flex;align-items:center;gap:6px}
#net-sel{background:#0A1825;border:1.5px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:10px;padding:2px 6px;cursor:pointer;max-width:210px;outline:none}
#net-sel option{background:#0D1E30}
.zoom-btns{display:flex;gap:4px;margin-left:auto;align-items:center;flex-shrink:0}
.zbtn{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:12px;padding:2px 9px;cursor:pointer;font-family:inherit;transition:all .12s}
.zbtn:hover{border-color:#3A8FD8;color:#B0E4FF}
.zoom-val{font-size:9px;color:var(--text2);padding:0 5px;min-width:42px;text-align:center}
.infobar{background:var(--bg2);border-bottom:1px solid var(--border);padding:3px 16px;display:flex;gap:14px;font-size:9px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
.infobar span{color:var(--text);font-weight:700}
#canvas-wrap{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
#canvas-wrap.dragging{cursor:grabbing}
svg#board{width:100%;height:100%;display:block}
#tooltip{position:absolute;background:#0D1E30EE;border:1px solid #2A5070;border-radius:4px;padding:5px 8px;font-size:9px;pointer-events:none;display:none;z-index:100;max-width:260px;line-height:1.8}
.hint{position:absolute;bottom:7px;right:10px;font-size:8px;color:var(--text2);opacity:.4;pointer-events:none}
</style>
</head>
<body>
<header>
  <span style="font-size:19px">🔬</span>
  <div>
    <div class="title">PCB Component Viewer — USB Audio Board</div>
    <div class="sub">18.1×35.4 mm · 58 comps · TOP layer · 32 nets · clearance=0.075mm</div>
  </div>
</header>
<div class="ctrl-row">
  <span class="ctrl-label">显示</span>
  <label class="ck-item"><input type="checkbox" id="ck-outline" checked onchange="setVis('g-outline',this.checked)">
    <span class="ck-dot" style="background:#2A80C0;border:1px solid #4AB0E0"></span>板框</label>
  <label class="ck-item"><input type="checkbox" id="ck-keepin" checked onchange="setVis('g-keepin',this.checked)">
    <span class="ck-dot" style="background:transparent;border:1px dashed #4A80A0"></span>Route Keepin</label>
  <label class="ck-item"><input type="checkbox" id="ck-comps" checked onchange="setVis('g-comps',this.checked)">
    <span class="ck-dot" style="background:#3A6080;border:1px solid #6AA0C0"></span>组件</label>
  <label class="ck-item"><input type="checkbox" id="ck-clearance" checked onchange="setVis('g-clearance',this.checked)">
    <span class="ck-dot" style="background:#FF8C42;opacity:.5;border:1px solid #FF8C42"></span>Clearance</label>
  <label class="ck-item"><input type="checkbox" id="ck-feasible" checked onchange="setVis('g-feasible',this.checked)">
    <span class="ck-dot" style="background:#00CC77;opacity:.4;border:1px solid #00EE88"></span>可行域</label>
  <label class="ck-item"><input type="checkbox" id="ck-pins" checked onchange="setVis('g-pins',this.checked)">
    <span class="ck-dot" style="background:#FFD070;border:1px solid #FFD070"></span>引脚</label>
  <div class="sep"></div>
  <div class="net-wrap"><span class="ctrl-label">Net</span>
    <select id="net-sel" onchange="filterNet(this.value)"><option value="">— 全部 —</option></select>
  </div>
  <div class="zoom-btns">
    <button class="zbtn" onclick="resetView()">⊡ Fit</button>
    <button class="zbtn" onclick="zoomStep(1.35)">＋</button>
    <span class="zoom-val" id="zoom-val">100%</span>
    <button class="zbtn" onclick="zoomStep(1/1.35)">－</button>
  </div>
</div>
<div class="infobar">
  <div>Board: <span>18.1×35.4 mm</span></div>
  <div>Comps: <span>58</span></div>
  <div>Pins: <span>165</span></div>
  <div>Nets: <span>32</span></div>
  <div>可行域: <span id="i-area">348.6</span> mm²</div>
  <div>Net: <span id="i-net" style="color:#00DD88">—</span></div>
</div>
<div id="canvas-wrap">
  <svg id="board" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="0.3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <g id="root-g">
      <g id="g-feasible"></g>
      <g id="g-clearance"></g>
      <g id="g-keepin"></g>
      <g id="g-outline"></g>
      <g id="g-comps"></g>
      <g id="g-pins"></g>
    </g>
  </svg>
  <div id="tooltip"></div>
  <div class="hint">Scroll=zoom · Drag=pan · Fit=reset · 点击组件/引脚查看网络</div>
</div>

addTo(GS.keepin, mkEl('path',{
  d:PCB.keepin_path, fill:'none', stroke:'#2A6090',
  'stroke-width':'0.07', 'stroke-dasharray':'0.5,0.3',
}));

// ── 绘制可行域 ──
PCB.feasible_paths.forEach(d=>{
  addTo(GS.feasible, mkEl('path',{
    d, fill:'#00CC7720', stroke:'#00CC77', 'stroke-width':'0.05',
  }));
});

// ── 绘制 Clearance ──
PCB.clearance_paths.forEach(d=>{
  addTo(GS.clearance, mkEl('path',{
    d, fill:'#FF8C4215', stroke:'#FF8C42', 'stroke-width':'0.04', opacity:'0.85',
  }));
});

// ── 绘制组件 + 引脚 ──
let currentNet='';
function renderComps(){
  GS.comps.innerHTML='';
  GS.pins.innerHTML='';

  PCB.comps.forEach(comp=>{
    const [bx0,by0,bx1,by1]=comp.bbox;
    // bbox 是 PCB mm 坐标（Y 向上），需要 flip Y for SVG
    const sBY0=-by1, sBY1=-by0;
    const cx=comp.cx, cy=-comp.cy;

    const hasNet=!currentNet||comp.pins.some(p=>p.net===currentNet);
    const dimAlpha=hasNet?1:0.12;

    // 组件矩形
    const rx=Math.min(bx0,bx1), rw=Math.abs(bx1-bx0);
    const ry=Math.min(sBY0,sBY1), rh=Math.abs(sBY1-sBY0);
    const rect=mkEl('rect',{
      x:rx,y:ry,width:rw,height:rh,
      fill:`rgba(42,80,120,${hasNet?0.45:0.06})`,
      stroke:hasNet?'#5A9CC0':'#1E3A50',
      'stroke-width':'0.04',
      opacity:dimAlpha,
      cursor:'pointer',
    });
    rect.addEventListener('mouseenter',e=>showCompTip(e,comp));
    rect.addEventListener('mouseleave',()=>{TIP.style.display='none';});
    rect.addEventListener('mousemove',moveTip);
    addTo(GS.comps,rect);

    // 组件标注（尺寸够大才显示）
    if(rw>0.5&&rh>0.25&&hasNet){
      const fs=Math.min(rw*0.35,rh*0.55,0.28);
      addTo(GS.comps,mkEl('text',{
        x:cx,y:cy,
        fill:'#7ABCE0','font-size':fs.toFixed(3),
        'text-anchor':'middle','dominant-baseline':'middle',
        'pointer-events':'none',
      })).textContent=comp.refdes;
    }

    // 引脚点
    comp.pins.forEach(p=>{
      const px=p.x, py=-p.y;  // flip Y
      const nc=netColor(p.net);
      const pinActive=!currentNet||(p.net===currentNet);
      const circ=mkEl('circle',{
        cx:px,cy:py,r:'0.09',
        fill:nc, stroke:'#07111F', 'stroke-width':'0.02',
        opacity:pinActive?1:0.08,
        cursor:'pointer',
      });
      circ.addEventListener('mouseenter',e=>showPinTip(e,p,comp.refdes));
      circ.addEventListener('mouseleave',()=>{TIP.style.display='none';});
      circ.addEventListener('mousemove',moveTip);
      addTo(GS.pins,circ);
    });
  });
}

// ── Net 下拉 ──
const netSel=document.getElementById('net-sel');
PCB.nets.forEach(n=>{
  const o=document.createElement('option');
  o.value=n;o.textContent=n;
  o.style.color=netColor(n);
  netSel.appendChild(o);
});
// 预先建立颜色映射
PCB.nets.forEach(n=>netColor(n));

function filterNet(n){
  currentNet=n;
  document.getElementById('i-net').textContent=n||'—';
  renderComps();
}

// ── Tooltip ──
const TIP=document.getElementById('tooltip');
function moveTip(e){
  const wrap=document.getElementById('canvas-wrap').getBoundingClientRect();
  let lx=e.clientX-wrap.left+12, ly=e.clientY-wrap.top+8;
  if(lx+260>wrap.width)lx=e.clientX-wrap.left-270;
  TIP.style.left=lx+'px';TIP.style.top=ly+'px';
}
function showCompTip(e,comp){
  const nets=[...new Set(comp.pins.map(p=>p.net).filter(Boolean))];
  const nHtml=nets.slice(0,6).map(n=>`<span style="color:${netColor(n)}">${n}</span>`).join(', ')+(nets.length>6?'…':'');
  TIP.innerHTML=`<b style="color:#6AC0F0">${comp.refdes}</b>　<span style="color:var(--text2)">${comp.package}</span><br>`+
    `引脚: <b>${comp.pins.length}</b>　&nbsp;Nets: <b>${nets.length}</b><br>`+
    `<span style="color:var(--text2)">Nets: </span>${nHtml}`;
  TIP.style.display='block';moveTip(e);
}
function showPinTip(e,p,refdes){
  const col=netColor(p.net);
  TIP.innerHTML=`<b style="color:${col}">${refdes} · Pin ${p.num}</b><br>`+
    `Net: <b style="color:${col}">${p.net||'—'}</b><br>`+
    `Pos: (${p.x.toFixed(3)}, ${p.y.toFixed(3)}) mm`;
  TIP.style.display='block';moveTip(e);
}

// ── Pan / Zoom ──
const CANVAS=document.getElementById('canvas-wrap');
const ROOT=document.getElementById('root-g');
let tr={x:0,y:0,k:1},fitK=20,fitX=0,fitY=0,svgW=800,svgH=600;

function applyTransform(){
  ROOT.setAttribute('transform',`translate(${tr.x.toFixed(2)},${tr.y.toFixed(2)}) scale(${tr.k.toFixed(4)})`);
  document.getElementById('zoom-val').textContent=Math.round(tr.k/fitK*100)+'%';
}
function calcFit(){
  const rect=CANVAS.getBoundingClientRect();
  svgW=rect.width||800;svgH=rect.height||600;
  const b=PCB.bbox;
  // PCB Y range: ymin..ymax (PCB coords)
  // SVG Y = -y_pcb, so SVG range: -ymax .. -ymin
  const w=b.xmax-b.xmin, h=b.ymax-b.ymin;
  const pad=1.5; // mm padding
  const kx=(svgW*0.9)/w, ky=(svgH*0.88)/h;
  fitK=Math.min(kx,ky);
  // Center: SVG coords of PCB center
  const pcbCX=(b.xmin+b.xmax)/2;
  const pcbCY=(b.ymin+b.ymax)/2;   // in PCB coords
  // SVG of center = (pcbCX, -pcbCY)
  fitX=svgW/2 - pcbCX*fitK;
  fitY=svgH/2 + pcbCY*fitK;   // +because SVG_y = -pcb_y
}
function resetView(){calcFit();tr={x:fitX,y:fitY,k:fitK};applyTransform();}
function zoomStep(f){zoomAt(svgW/2,svgH/2,f);}
function zoomAt(cx,cy,f){
  const nk=Math.max(fitK*.05,Math.min(fitK*400,tr.k*f));
  const r=nk/tr.k;
  tr.x=cx-(cx-tr.x)*r;tr.y=cy-(cy-tr.y)*r;tr.k=nk;
  applyTransform();
}

CANVAS.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=e.currentTarget.getBoundingClientRect();
  zoomAt(e.clientX-r.left,e.clientY-r.top,e.deltaY<0?1.15:1/1.15);
},{passive:false});

let drag=null;
CANVAS.addEventListener('mousedown',e=>{
  if(e.button!==0)return;
  drag={sx:e.clientX,sy:e.clientY,tx:tr.x,ty:tr.y};
  CANVAS.classList.add('dragging');
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  tr.x=drag.tx+(e.clientX-drag.sx);tr.y=drag.ty+(e.clientY-drag.sy);
  applyTransform();
});
window.addEventListener('mouseup',()=>{drag=null;CANVAS.classList.remove('dragging');});

function setVis(id,v){document.getElementById(id).style.display=v?'':'none';}

window.addEventListener('DOMContentLoaded',()=>{
  renderComps();
  resetView();
});
window.addEventListener('resize',resetView);
</script>
