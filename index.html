<!DOCTYPE html>
<html lang="zh-CN"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>PCB A* Router v2</title>
<style>
:root{--bg:#07111F;--bg2:#0D1E30;--bg3:#112540;--bd:#1E3A5A;--tx:#B8D4F0;--tx2:#4A7899}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'SFMono-Regular',Consolas,monospace;display:flex;flex-direction:column;height:100vh;overflow:hidden}
header{background:var(--bg2);border-bottom:1px solid var(--bd);padding:7px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.title{font-size:12px;font-weight:700;color:#3AD8FF}.sub{font-size:9px;color:var(--tx2);margin-top:1px}
.badge{font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700}
.ok{background:#0A3020;color:#00DD88;border:1px solid #00CC77}
.fail{background:#301010;color:#FF7070;border:1px solid #CC4444}
.tabs{background:var(--bg2);border-bottom:1px solid var(--bd);padding:4px 14px;display:flex;gap:5px;align-items:center;flex-shrink:0}
.tl{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-right:3px}
.ltab{background:var(--bg3);border:1.5px solid var(--bd);border-radius:5px;color:var(--tx2);font-size:10px;font-family:inherit;padding:3px 10px;cursor:pointer;transition:all .12s}
.ltab:hover{border-color:#3A8FD8;color:#B0E4FF}
.ltab.active{background:#133050;border-color:#3A8FD8;color:#7FD4FF;font-weight:700}
.ctrl{background:var(--bg2);border-bottom:1px solid var(--bd);padding:5px 14px;display:flex;gap:9px;align-items:center;flex-shrink:0;flex-wrap:wrap}
.cl{font-size:9px;color:var(--tx2);text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.sep{width:1px;background:var(--bd);height:13px;flex-shrink:0}
.ck{display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none;font-size:10px;color:var(--tx)}
.ck input{accent-color:#3A8FD8;width:12px;height:12px;cursor:pointer}
.dot{width:8px;height:8px;border-radius:2px;flex-shrink:0}
.nw{display:flex;align-items:center;gap:5px}
#ns{background:#0A1825;border:1.5px solid var(--bd);border-radius:4px;color:var(--tx);font-family:inherit;font-size:10px;padding:2px 5px;cursor:pointer;max-width:195px;outline:none}
#ns option{background:#0D1E30}
.zb-row{display:flex;gap:4px;margin-left:auto;align-items:center;flex-shrink:0}
.zb{background:var(--bg3);border:1px solid var(--bd);border-radius:4px;color:var(--tx);font-size:12px;padding:2px 8px;cursor:pointer;font-family:inherit;transition:all .12s}
.zb:hover{border-color:#3A8FD8;color:#B0E4FF}
.zv{font-size:9px;color:var(--tx2);padding:0 4px;min-width:40px;text-align:center}
.info{background:var(--bg2);border-bottom:1px solid var(--bd);padding:3px 14px;display:flex;gap:12px;font-size:9px;color:var(--tx2);flex-shrink:0;flex-wrap:wrap}
.info span{color:var(--tx);font-weight:700}
#cw{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:grab}
#cw.drag{cursor:grabbing}
svg#sv{width:100%;height:100%;display:block}
#tp{position:absolute;background:#0D1E30EE;border:1px solid #2A5070;border-radius:4px;padding:5px 8px;font-size:9px;pointer-events:none;display:none;z-index:100;max-width:250px;line-height:1.8}
.hint{position:absolute;bottom:6px;right:9px;font-size:8px;color:var(--tx2);opacity:.35;pointer-events:none}
</style></head><body>

const NS="http://www.w3.org/2000/svg";

let curL="ALL",nf="";
const el=id=>document.getElementById(id);
const mk=(t,a)=>{const e=document.createElementNS(NS,t);for(const[k,v]of Object.entries(a||{}))e.setAttribute(k,v);return e;};
// pan/zoom
const cw=el("cw");let tx=0,ty=0,sc2=1;
function at(){el("rg").setAttribute("transform",`translate(${tx},${ty}) scale(${sc2})`);el("zv").textContent=Math.round(sc2*100)+"%";}
function rv(){const r=cw.getBoundingClientRect(),s=Math.min(r.width/D.vw,r.height/D.vh)*0.92;sc2=s;tx=r.width/2-(D.vx+D.vw/2)*s;ty=r.height/2-(D.vy+D.vh/2)*s;at();}
function zs(f){const r=cw.getBoundingClientRect();tx=(tx-r.width/2)*f+r.width/2;ty=(ty-r.height/2)*f+r.height/2;sc2*=f;at();}
let drag=false,lx=0,ly2=0;

function sv2(id,v){const g=el(id);if(g)g.style.display=v?"":"none";}
// tooltip
const tp=el("tp");
function tip(e,h){tp.innerHTML=h;tp.style.display="block";const r=cw.getBoundingClientRect();let l=e.clientX-r.left+12,t=e.clientY-r.top+12;if(l+260>r.width)l-=272;if(t+100>r.height)t-=110;tp.style.left=l+"px";tp.style.top=t+"px";}

// init
function init(){
  el("b-ok").textContent="\u2713 "+D.stats.ok+"\u6210\u529f";

  const s=el("ns");D.nets.forEach(n=>{const o=document.createElement("option");o.value=n;o.textContent=n;s.appendChild(o);});

      el("g-pi").appendChild(ci);
    });
  });
}
function bld(lk){
  ["g-fs","g-gd","g-wi","g-vi","g-rt"].forEach(id=>el(id).innerHTML="");
  const ls=lk==="ALL"?LY:[lk];
  // feasible
  ls.forEach(ln=>{

  });
  // grid
  ls.forEach(ln=>{
    const gd=ln==="TOP"?D.gridTop:D.gridInner;
    if(gd)el("g-gd").appendChild(mk("path",{d:gd,fill:"none",stroke:GC[ln],"stroke-width":"0.055",opacity:lk==="ALL"?"0.6":"0.8","stroke-linecap":"round","pointer-events":"none"}));

  ls.forEach(ln=>{

      el("g-wi").appendChild(p);
    });
  });
  // vias
  D.vias.forEach(v=>{
    if(lk!=="ALL"&&v.l1!==lk&&v.l2!==lk)return;
    const ci=mk("circle",{cx:v.x,cy:v.y,r:"0.2",fill:"#1A1A00",stroke:"#FFD070","stroke-width":"0.1","data-net":v.net,filter:"url(#gw)",style:"cursor:pointer"});
    const d2=mk("circle",{cx:v.x,cy:v.y,r:"0.07",fill:v.color,"pointer-events":"none"});
    ci.addEventListener("mousemove",e=>tip(e,`<b style="color:#FFD070">VIA</b><br>${v.l1}&#8594;${v.l2}<br><span style="color:#7FD4FF">${v.net}</span>`));
    el("g-vi").appendChild(ci);el("g-vi").appendChild(d2);
  });

  D.rats.forEach(r=>{

}
function sw(lk){
  curL=lk;
  document.querySelectorAll(".ltab").forEach(t=>t.classList.toggle("active",t.getAttribute("data-l")===lk));

init();sw("ALL");window.addEventListener("resize",rv);setTimeout(rv,80);
